<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AntigravityAgent — Live Workflow Viewer</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #13131a;
            --card-hover: #1a1a24;
            --border: #2a2a3a;
            --text: #e4e4ef;
            --muted: #71717a;
            --green: #22c55e;
            --green-glow: rgba(34, 197, 94, 0.3);
            --red: #ef4444;
            --red-glow: rgba(239, 68, 68, 0.3);
            --blue: #3b82f6;
            --blue-glow: rgba(59, 130, 246, 0.25);
            --purple: #a855f7;
            --purple-glow: rgba(168, 85, 247, 0.25);
            --yellow: #eab308;
            --yellow-glow: rgba(234, 179, 8, 0.25);
            --orange: #f97316;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Top Bar --- */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            border-bottom: 1px solid var(--border);
            background: rgba(13, 13, 19, 0.9);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .topbar h1 {
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .topbar h1 span {
            background: linear-gradient(135deg, #60a5fa, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .mode-toggle {
            display: flex;
            background: var(--card);
            border-radius: 8px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .mode-btn {
            padding: 8px 18px;
            font-size: 0.8rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            border: none;
            cursor: pointer;
            background: transparent;
            color: var(--muted);
            transition: all 0.25s ease;
        }

        .mode-btn.active {
            background: var(--blue);
            color: white;
        }

        .mode-btn.active.buggy {
            background: var(--red);
        }

        .run-btn {
            padding: 10px 28px;
            font-size: 0.85rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            box-shadow: 0 0 20px var(--blue-glow);
            transition: all 0.3s ease;
            letter-spacing: 0.3px;
        }

        .run-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 0 30px var(--blue-glow);
        }

        .run-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .run-btn.running {
            background: linear-gradient(135deg, #eab308, #f97316);
            box-shadow: 0 0 20px var(--yellow-glow);
            animation: pulse-btn 1.5s infinite;
        }

        @keyframes pulse-btn {

            0%,
            100% {
                box-shadow: 0 0 20px var(--yellow-glow);
            }

            50% {
                box-shadow: 0 0 35px var(--yellow-glow);
            }
        }

        /* --- Layout --- */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 420px;
            gap: 0;
            height: calc(100vh - 57px);
        }

        /* --- Workflow Canvas --- */
        .canvas {
            padding: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .canvas::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 20% 30%, rgba(59, 130, 246, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(168, 85, 247, 0.05) 0%, transparent 50%);
        }

        .workflow-chain {
            display: flex;
            align-items: center;
            gap: 0;
            position: relative;
            z-index: 1;
        }

        /* --- Node --- */
        .node {
            width: 150px;
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 14px;
            padding: 20px 16px;
            text-align: center;
            position: relative;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: default;
        }

        .node-icon {
            font-size: 1.8rem;
            margin-bottom: 8px;
            display: block;
        }

        .node-label {
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .node-sub {
            font-size: 0.7rem;
            color: var(--muted);
            margin-top: 4px;
        }

        .node.idle {}

        .node.running {
            border-color: var(--blue);
            box-shadow: 0 0 25px var(--blue-glow), 0 0 50px rgba(59, 130, 246, 0.1);
            animation: node-pulse 1.5s infinite;
        }

        .node.pass {
            border-color: var(--green);
            box-shadow: 0 0 20px var(--green-glow);
        }

        .node.fail {
            border-color: var(--red);
            box-shadow: 0 0 25px var(--red-glow), 0 0 50px rgba(239, 68, 68, 0.1);
            animation: shake 0.5s ease-in-out;
        }

        @keyframes node-pulse {

            0%,
            100% {
                box-shadow: 0 0 20px var(--blue-glow);
            }

            50% {
                box-shadow: 0 0 40px var(--blue-glow);
            }
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-6px);
            }

            40% {
                transform: translateX(6px);
            }

            60% {
                transform: translateX(-4px);
            }

            80% {
                transform: translateX(4px);
            }
        }

        .tla-badge {
            position: absolute;
            top: -10px;
            right: -10px;
            font-size: 0.6rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 20px;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--muted);
            transition: all 0.4s ease;
            white-space: nowrap;
        }

        .tla-badge.checking {
            border-color: var(--yellow);
            color: var(--yellow);
            background: rgba(234, 179, 8, 0.1);
            animation: pulse-badge 1s infinite;
        }

        .tla-badge.pass {
            border-color: var(--green);
            color: var(--green);
            background: rgba(34, 197, 94, 0.1);
        }

        .tla-badge.fail {
            border-color: var(--red);
            color: var(--red);
            background: rgba(239, 68, 68, 0.15);
        }

        @keyframes pulse-badge {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        /* --- Connector Arrows --- */
        .connector {
            width: 60px;
            height: 2px;
            background: var(--border);
            position: relative;
            transition: background 0.5s ease;
        }

        .connector::after {
            content: '▶';
            position: absolute;
            right: -4px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.6rem;
            color: var(--border);
            transition: color 0.5s ease;
        }

        .connector.active {
            background: var(--green);
        }

        .connector.active::after {
            color: var(--green);
        }

        .connector.fail {
            background: var(--red);
        }

        .connector.fail::after {
            color: var(--red);
        }

        /* --- Right Panel: Log --- */
        .log-panel {
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            background: rgba(13, 13, 19, 0.6);
        }

        .log-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            font-weight: 700;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .log-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.78rem;
            line-height: 1.7;
        }

        .log-line {
            opacity: 0;
            animation: log-appear 0.3s ease forwards;
            padding: 2px 0;
        }

        @keyframes log-appear {
            from {
                opacity: 0;
                transform: translateY(4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .log-line.tla-pass {
            color: var(--green);
        }

        .log-line.tla-fail {
            color: var(--red);
            font-weight: 700;
        }

        .log-line.node-header {
            color: var(--purple);
            font-weight: 700;
            margin-top: 8px;
        }

        .log-line.tool {
            color: var(--blue);
        }

        .log-line.warn {
            color: var(--orange);
        }

        .log-line.dim {
            color: var(--muted);
        }

        .log-line.success {
            color: var(--green);
            font-weight: 700;
            margin-top: 8px;
        }

        /* --- Status Bar --- */
        .status-bar {
            padding: 12px 20px;
            border-top: 1px solid var(--border);
            font-size: 0.75rem;
            color: var(--muted);
            display: flex;
            justify-content: space-between;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
            background: var(--muted);
        }

        .status-dot.green {
            background: var(--green);
            box-shadow: 0 0 6px var(--green-glow);
        }

        .status-dot.red {
            background: var(--red);
            box-shadow: 0 0 6px var(--red-glow);
        }

        /* --- Scrollbar --- */
        .log-body::-webkit-scrollbar {
            width: 6px;
        }

        .log-body::-webkit-scrollbar-track {
            background: transparent;
        }

        .log-body::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        /* --- Responsive --- */
        @media (max-width: 900px) {
            .main-layout {
                grid-template-columns: 1fr;
            }

            .canvas {
                padding: 30px 10px;
            }

            .workflow-chain {
                flex-wrap: wrap;
                justify-content: center;
                gap: 10px;
            }

            .connector {
                display: none;
            }

            .node {
                width: 120px;
                padding: 14px 10px;
            }
        }
    </style>
</head>

<body>
    <div class="topbar">
        <h1>⚡ <span>AntigravityAgent</span> — Workflow Viewer</h1>
        <div class="controls">
            <div class="mode-toggle">
                <button class="mode-btn active" id="btn-safe" onclick="setMode('safe')">✅ Safe</button>
                <button class="mode-btn" id="btn-buggy" onclick="setMode('buggy')">⚠️ Buggy</button>
            </div>
            <button class="run-btn" id="run-btn" onclick="startRun()">▶ Start Run</button>
        </div>
    </div>

    <div class="main-layout">
        <div class="canvas">
            <div class="workflow-chain">
                <div class="node idle" id="node-plan">
                    <div class="tla-badge" id="tla-plan">TLA+</div>
                    <span class="node-icon">🧠</span>
                    <div class="node-label">Plan</div>
                    <div class="node-sub">TaskList + ImplPlan</div>
                </div>
                <div class="connector" id="conn-1"></div>
                <div class="node idle" id="node-code">
                    <div class="tla-badge" id="tla-code">TLA+</div>
                    <span class="node-icon">💻</span>
                    <div class="node-label">Code</div>
                    <div class="node-sub">Edit files</div>
                </div>
                <div class="connector" id="conn-2"></div>
                <div class="node idle" id="node-test">
                    <div class="tla-badge" id="tla-test">TLA+</div>
                    <span class="node-icon">🧪</span>
                    <div class="node-label">Test</div>
                    <div class="node-sub">Browser verify</div>
                </div>
                <div class="connector" id="conn-3"></div>
                <div class="node idle" id="node-deploy">
                    <div class="tla-badge" id="tla-deploy">TLA+</div>
                    <span class="node-icon">🚀</span>
                    <div class="node-label">Deploy</div>
                    <div class="node-sub">Ship it</div>
                </div>
            </div>
        </div>

        <div class="log-panel">
            <div class="log-header">📋 Execution Log</div>
            <div class="log-body" id="log-body"></div>
            <div class="status-bar" id="status-bar">
                <span><span class="status-dot" id="status-dot"></span> <span id="status-text">Ready — Select mode and
                        press Start</span></span>
                <span id="step-counter">Step 0/4</span>
            </div>
        </div>
    </div>

    <script>
        let mode = 'safe';
        let running = false;

        function setMode(m) {
            if (running) return;
            mode = m;
            document.getElementById('btn-safe').classList.toggle('active', m === 'safe');
            document.getElementById('btn-buggy').classList.toggle('active', m === 'buggy');
            document.getElementById('btn-buggy').classList.toggle('buggy', m === 'buggy');
            resetUI();
        }

        function resetUI() {
            ['plan', 'code', 'test', 'deploy'].forEach(n => {
                const el = document.getElementById('node-' + n);
                el.className = 'node idle';
                document.getElementById('tla-' + n).className = 'tla-badge';
                document.getElementById('tla-' + n).textContent = 'TLA+';
            });
            ['conn-1', 'conn-2', 'conn-3'].forEach(c => {
                document.getElementById(c).className = 'connector';
            });
            document.getElementById('log-body').innerHTML = '';
            document.getElementById('status-dot').className = 'status-dot';
            document.getElementById('status-text').textContent = 'Ready — Select mode and press Start';
            document.getElementById('step-counter').textContent = 'Step 0/4';
        }

        function log(text, cls = '') {
            const body = document.getElementById('log-body');
            const line = document.createElement('div');
            line.className = 'log-line ' + cls;
            line.textContent = text;
            body.appendChild(line);
            body.scrollTop = body.scrollHeight;
        }

        function setStatus(text, dotClass = '') {
            document.getElementById('status-text').textContent = text;
            document.getElementById('status-dot').className = 'status-dot ' + dotClass;
        }

        function setStep(n) {
            document.getElementById('step-counter').textContent = `Step ${n}/4`;
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function startRun() {
            if (running) return;
            running = true;
            resetUI();

            const btn = document.getElementById('run-btn');
            btn.classList.add('running');
            btn.textContent = '⏳ Running...';
            btn.disabled = true;

            log(`AntigravityAgent initialized`, 'dim');
            log(`Mode: ${mode === 'safe' ? '✅ SAFE (TLA+ Protected)' : '⚠️ BUGGY (Hallucination Sim)'}`, mode === 'safe' ? 'tla-pass' : 'warn');
            log(`Task: "Build minimal FastAPI todo app"`, 'dim');
            log('');
            await sleep(600);

            // --- PLAN ---
            await runNode('plan', 'conn-1', 1, [
                { text: '[TLA+] Verifying transition to pc="plan"...', cls: 'dim', delay: 400 },
                { text: '[TLA+] ✓ Verification PASS', cls: 'tla-pass', delay: 300 },
                { text: 'Generating TaskList artifact...', cls: 'tool', delay: 300 },
                { text: 'Generating ImplPlan artifact...', cls: 'tool', delay: 200 },
            ], true);

            // --- CODE ---
            await runNode('code', 'conn-2', 2, [
                { text: '[TLA+] Verifying transition to pc="code"...', cls: 'dim', delay: 400 },
                { text: '[TLA+] ✓ Verification PASS', cls: 'tla-pass', delay: 300 },
                { text: '🔧 Tool: run_terminal → pip install fastapi', cls: 'tool', delay: 350 },
                { text: '🔧 Tool: edit_file → main.py (137 bytes)', cls: 'tool', delay: 250 },
            ], true);

            // --- TEST ---
            if (mode === 'safe') {
                await runNode('test', 'conn-3', 3, [
                    { text: '[TLA+] Verifying transition to pc="test"...', cls: 'dim', delay: 400 },
                    { text: '[TLA+] ✓ Verification PASS', cls: 'tla-pass', delay: 300 },
                    { text: '🔧 Tool: browser_test → http://localhost:8000/todos', cls: 'tool', delay: 400 },
                    { text: '📝 Artifact "test_report" created', cls: 'tla-pass', delay: 200 },
                ], true);
            } else {
                // Buggy: hallucinate
                const testNode = document.getElementById('node-test');
                const tlaBadge = document.getElementById('tla-test');
                testNode.className = 'node running';
                tlaBadge.className = 'tla-badge checking';
                tlaBadge.textContent = 'Checking...';

                log('', '');
                log('--- 🧪 NODE: TEST ---', 'node-header');
                await sleep(500);
                log('[TLA+] Verifying transition to pc="test"...', 'dim');
                await sleep(400);
                log('[TLA+] ✓ Verification PASS', 'tla-pass');
                tlaBadge.className = 'tla-badge pass';
                tlaBadge.textContent = '✓ PASS';
                await sleep(400);
                log('⚠️ BUGGY LLM: Hallucinating test completion!', 'warn');
                log('⚠️ No test_report artifact generated!', 'warn');
                await sleep(500);
                testNode.className = 'node pass';
                document.getElementById('conn-3').className = 'connector active';
                setStep(3);
                await sleep(300);
            }

            // --- DEPLOY ---
            if (mode === 'safe') {
                await runNode('deploy', null, 4, [
                    { text: '[TLA+] Verifying transition to pc="deploy"...', cls: 'dim', delay: 400 },
                    { text: '[TLA+] Checking Invariant: NoDeployUntested...', cls: 'dim', delay: 500 },
                    { text: '[TLA+] "test_report" ∈ artifacts → TRUE', cls: 'tla-pass', delay: 300 },
                    { text: '[TLA+] ✓ Verification PASS', cls: 'tla-pass', delay: 300 },
                    { text: '📝 Artifact "walkthrough" created', cls: 'tool', delay: 200 },
                ], true);

                log('');
                log('✅ ══════════════════════════════════════ ✅', 'success');
                log('   RUN COMPLETE — All invariants passed', 'success');
                log('✅ ══════════════════════════════════════ ✅', 'success');
                setStatus('Complete — All invariants verified', 'green');
            } else {
                // Buggy deploy: TLA+ blocks it
                const deployNode = document.getElementById('node-deploy');
                const tlaDeploy = document.getElementById('tla-deploy');

                deployNode.className = 'node running';
                tlaDeploy.className = 'tla-badge checking';
                tlaDeploy.textContent = 'Checking...';
                log('', '');
                log('--- 🚀 NODE: DEPLOY ---', 'node-header');
                await sleep(500);
                log('[TLA+] Verifying transition to pc="deploy"...', 'dim');
                await sleep(500);
                log('[TLA+] Checking Invariant: NoDeployUntested...', 'dim');
                await sleep(700);
                log('[TLA+] "test_report" ∈ artifacts → FALSE', 'tla-fail');
                await sleep(400);

                tlaDeploy.className = 'tla-badge fail';
                tlaDeploy.textContent = '✗ FAIL';
                deployNode.className = 'node fail';
                document.getElementById('conn-3').className = 'connector fail';

                log('');
                log('❌ ══════════════════════════════════════ ❌', 'tla-fail');
                log('  🚨 TLA+ INVARIANT VIOLATION DETECTED 🚨', 'tla-fail');
                log('❌ ══════════════════════════════════════ ❌', 'tla-fail');
                log('');
                log('FATAL: NoDeployUntested violated!', 'tla-fail');
                log('Cannot deploy without "test_report" artifact.', 'tla-fail');
                log('');
                log('Execution HALTED. Deploy blocked.', 'warn');
                setStatus('BLOCKED — Invariant violation', 'red');
                setStep(3);
            }

            btn.classList.remove('running');
            btn.textContent = '▶ Start Run';
            btn.disabled = false;
            running = false;
        }

        async function runNode(name, nextConn, stepNum, logs, pass) {
            const node = document.getElementById('node-' + name);
            const badge = document.getElementById('tla-' + name);
            const labels = { plan: 'PLAN', code: 'CODE', test: 'TEST', deploy: 'DEPLOY' };

            node.className = 'node running';
            badge.className = 'tla-badge checking';
            badge.textContent = 'Checking...';
            log('', '');
            log(`--- ${node.querySelector('.node-icon').textContent} NODE: ${labels[name]} ---`, 'node-header');

            for (const entry of logs) {
                await sleep(entry.delay);
                log(entry.text, entry.cls);
                if (entry.cls === 'tla-pass' && entry.text.includes('PASS')) {
                    badge.className = 'tla-badge pass';
                    badge.textContent = '✓ PASS';
                }
            }

            await sleep(300);
            node.className = pass ? 'node pass' : 'node fail';
            if (nextConn) document.getElementById(nextConn).className = 'connector active';
            setStep(stepNum);
        }
    </script>
</body>

</html>
